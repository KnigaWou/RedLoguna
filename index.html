<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УВБ-76 — Анализатор</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header>
            <div>
                <h1>УВБ-76 <small>Расшифровка сигналов • 2023–2026</small></h1>
            </div>
            <div class="clock" id="clock">--:--:-- MSK</div>
        </header>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="num" id="totalCount">0</div>
                <div class="label">Всего сообщений</div>
            </div>
            <div class="stat-item">
                <div class="num" id="todayCount">0</div>
                <div class="label">Сегодня</div>
            </div>
            <div class="stat-item">
                <div class="num" id="lastDate">--</div>
                <div class="label">Последнее</div>
            </div>
            <div class="stat-item">
                <div class="num" id="dictSize">0</div>
                <div class="label">Слов в словаре</div>
            </div>
        </div>

        <!-- Прогноз -->
        <div class="forecast-box">
            <div class="title">🔮 Прогноз</div>
            <div class="text" id="forecastText">Загрузка...</div>
        </div>

        <!-- Карта -->
        <div id="map"></div>

        <!-- Таблица переводов -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Когда</th>
                        <th>Кто</th>
                        <th>Перевод</th>
                        <th>Цифры</th>
                    </tr>
                </thead>
                <tbody id="messagesBody">
                    <tr><td colspan="4" style="text-align:center;color:#5a6a7a;">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            Данные перехватов из открытых источников. Карта показывает реальные объекты.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
    </html>
