<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>УВБ-76 — Живой приёмник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e17; color: #c8d6e5; font-family: monospace; padding: 16px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(16,24,40,0.85); border: 1px solid #1a2a4a; border-radius: 12px; margin-bottom: 16px; }
        header h1 { font-size: 1.5rem; color: #58a6ff; }
        .clock { font-size: 1.1rem; color: #f0e6d0; }
        .status-bar { display: flex; gap: 20px; flex-wrap: wrap; padding: 10px 16px; background: rgba(16,24,40,0.6); border: 1px solid #1a2a4a; border-radius: 10px; margin-bottom: 16px; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
        .status-dot.active { background: #00ff88; box-shadow: 0 0 15px #00ff88; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .live-block { background: rgba(16,24,40,0.8); border: 1px solid #1a2a4a; border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
        .live-row { display: flex; gap: 12px; padding: 4px 0; font-size: 1rem; flex-wrap: wrap; }
        .live-row .label { color: #8b949e; min-width: 120px; }
        .live-row .value { color: #f0e6d0; }
        .live-row.translation .value { color: #58a6ff; font-weight: 600; }
        .btn { background: #1f6feb; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        .btn:hover { background: #58a6ff; }
        #log { margin-top: 10px; background: #161b22; padding: 10px; border-radius: 8px; font-size: 0.8rem; max-height: 150px; overflow-y: auto; color: #8b949e; }
        .footer { text-align: center; color: #3a4a6a; font-size: 0.7rem; padding: 12px 0; border-top: 1px solid #1a2a4a; margin-top: 16px; }
        .history-item { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid rgba(26,42,74,0.2); font-size: 0.8rem; }
        .history-item .time { color: #5a6a7a; min-width: 60px; }
        .history-item .text { color: #c8d6e5; flex: 1; }
        .history-item .trans { color: #58a6ff; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🦇 УВБ-76 <small>Живой приёмник</small></h1>
        <div class="clock" id="clock">--:-- MSK</div>
    </header>

    <div class="status-bar">
        <div class="status-item">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Подключение...</span>
        </div>
        <div class="status-item">
            <span>📡</span>
            <span>Частота: <strong>4625</strong> кГц</span>
        </div>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn" id="playBtn">▶ Включить звук</button>
        <button class="btn" id="stopBtn" style="display:none;">⏹ Выключить</button>
        <button class="btn" id="micBtn">🎤 Распознавание</button>
    </div>

    <div class="live-block">
        <div class="live-row">
            <span class="label">📡 Статус:</span>
            <span class="value" id="statusText2">Ожидание...</span>
        </div>
        <div class="live-row">
            <span class="label">🎤 Что сказано:</span>
            <span class="value" id="liveText">Ожидание...</span>
        </div>
        <div class="live-row translation">
            <span class="label">📖 Перевод:</span>
            <span class="value" id="liveTranslation">—</span>
        </div>
    </div>

    <!-- Лента переводов -->
    <div style="background:rgba(16,24,40,0.7);border-radius:12px;padding:12px;margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:#8b949e;font-size:0.8rem;">📋 Лента переводов</span>
            <span style="color:#5a6a7a;font-size:0.7rem;" id="historyCount">0</span>
        </div>
        <div id="historyList"><div style="color:#5a6a7a;padding:8px 0;">Нет перехватов</div></div>
    </div>

    <div id="log">📋 Готов. Нажмите «Включить звук».</div>
    <div class="footer">Сервер на Render. Распознавание через браузер.</div>
</div>

<script>
    // ============================================
    //  УВБ-76 — сайт с распознаванием через браузер
    // ============================================

    let ws = null;
    let audioContext = null;
    let isPlaying = false;
    let recognition = null;
    let isMicActive = false;
    let history = [];

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusText2 = document.getElementById('statusText2');
    const liveText = document.getElementById('liveText');
    const liveTranslation = document.getElementById('liveTranslation');
    const logDiv = document.getElementById('log');
    const historyList = document.getElementById('historyList');
    const historyCount = document.getElementById('historyCount');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const micBtn = document.getElementById('micBtn');

    const SERVER_URL = 'wss://redloguna.onrender.com';

    // ----- СЛОВАРЬ -----
    const DICT = {
        "ОБЕЗЬЯНКА": "✅ Завершение операции",
        "МЕРЗЛЫЙ": "🛠️ Техпроверка",
        "ГОЛОСОК": "🔊 Активация сети",
        "ОКОНЧАНЬЕ": "🔇 Завершение сеанса",
        "НЕРЧИНСКИЙ": "🚀 РВСН",
        "СУПЕРМАТИЗМ": "🎯 Наведение",
        "ЛАТВИЯ": "🌍 Прибалтика",
        "КАВКАЗ": "🌍 Кавказ",
        "КИТАЙСКИЙ": "🌍 Китай",
        "0010": "🎯 Боевой приказ",
        "0104": "📡 Смена частоты"
    };

    function translate(text) {
        for (const [key, value] of Object.entries(DICT)) {
            if (text.toUpperCase().includes(key)) {
                return value;
            }
        }
        return '📻 Неизвестно';
    }

    // ----- ИСТОРИЯ -----
    function addHistory(text, translation) {
        const now = new Date();
        const time = now.toTimeString().slice(0, 8);
        history.unshift({ time, text, translation });
        if (history.length > 50) history.pop();
        renderHistory();
    }

    function renderHistory() {
        if (history.length === 0) {
            historyList.innerHTML = '<div style="color:#5a6a7a;padding:8px 0;">Нет перехватов</div>';
            historyCount.textContent = '0';
            return;
        }
        let html = '';
        history.slice(0, 20).forEach(item => {
            html += `
                <div class="history-item">
                    <span class="time">${item.time}</span>
                    <span class="text">${item.text}</span>
                    <span class="trans">→ ${item.translation}</span>
                </div>
            `;
        });
        historyList.innerHTML = html;
        historyCount.textContent = history.length;
    }

    // ----- ЛОГ -----
    function log(msg, type = 'info') {
        const time = new Date().toTimeString().slice(0, 8);
        const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'info';
        logDiv.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // ----- РАСПОЗНАВАНИЕ РЕЧИ (БРАУЗЕР) -----
    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
            log('❌ Браузер не поддерживает распознавание', 'err');
            return;
        }
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = function(event) {
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const result = event.results[i];
                if (result.isFinal) {
                    const text = result[0].transcript.trim();
                    if (text.length > 2) {
                        const translation = translate(text);
                        liveText.textContent = text;
                        liveTranslation.textContent = translation;
                        addHistory(text, translation);
                        log(`🎤 "${text}" → ${translation}`, 'ok');
                    }
                } else {
                    const text = result[0].transcript.trim();
                    if (text.length > 2) {
                        liveText.textContent = text + '...';
                    }
                }
            }
        };

        recognition.onerror = function(e) {
            if (e.error === 'not-allowed') {
                log('❌ Нет доступа к микрофону', 'err');
            }
            isMicActive = false;
            micBtn.textContent = '🎤 Распознавание';
            micBtn.style.background = '#1f6feb';
        };

        recognition.onend = function() {
            if (isMicActive) {
                try { recognition.start(); } catch (e) {}
            }
        };
    }

    function toggleMic() {
        if (!recognition) {
            initRecognition();
            if (!recognition) return;
        }
        if (isMicActive) {
            isMicActive = false;
            try { recognition.stop(); } catch (e) {}
            micBtn.textContent = '🎤 Распознавание';
            micBtn.style.background = '#1f6feb';
            log('⏹ Распознавание остановлено', 'info');
        } else {
            isMicActive = true;
            try { recognition.start(); } catch (e) {}
            micBtn.textContent = '🔴 Слушаю...';
            micBtn.style.background = '#ff6b6b';
            log('🎤 Распознавание запущено', 'ok');
        }
    }

    // ----- WEBSOCKET (ПОДКЛЮЧЕНИЕ К СЕРВЕРУ) -----
    function connectWebSocket() {
        ws = new WebSocket(SERVER_URL);
        ws.onopen = function() {
            statusDot.className = 'status-dot active';
            statusText.textContent = '✅ Подключено';
            statusText2.textContent = '✅ Сервер';
            log('✅ Подключено к серверу', 'ok');
        };
        ws.onmessage = function(event) {
            if (event.data instanceof Blob && isPlaying) {
                playAudio(event.data);
            }
        };
        ws.onerror = function() {
            statusDot.className = 'status-dot';
            statusText.textContent = '❌ Ошибка';
            log('❌ Ошибка сервера', 'err');
        };
        ws.onclose = function() {
            statusDot.className = 'status-dot';
            statusText.textContent = '⚠️ Отключено';
            log('⚠️ Отключено, переподключение...', 'warn');
            setTimeout(connectWebSocket, 5000);
        };
    }

    // ----- АУДИО -----
    function playAudio(data) {
        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                audioContext.decodeAudioData(arrayBuffer, function(buffer) {
                    const source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.destination);
                    source.start(0);
                });
            };
            reader.readAsArrayBuffer(data);
        } catch (e) {}
    }

    // ----- КНОПКИ -----
    playBtn.onclick = function() {
        isPlaying = true;
        playBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        log('🔊 Звук включён', 'ok');
    };

    stopBtn.onclick = function() {
        isPlaying = false;
        playBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        log('🔇 Звук выключен', 'info');
    };

    micBtn.onclick = toggleMic;

    // ----- ЧАСЫ -----
    setInterval(() => {
        const now = new Date();
        const msk = new Date(now.getTime() + 3 * 60 * 60 * 1000);
        document.getElementById('clock').textContent = msk.toISOString().slice(11, 16) + ' MSK';
    }, 1000);

    // ----- ЗАПУСК -----
    connectWebSocket();
    log('📋 Готов. Нажмите «Включить звук» и «Распознавание».', 'info');
    log('🌐 Адрес сервера: ' + SERVER_URL, 'info');
</script>

</body>
    </html>
