<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УВБ-76 — Живой приёмник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e17; color: #c8d6e5; font-family: 'Segoe UI', monospace; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(16,24,40,0.85); border: 1px solid #1a2a4a; border-radius: 12px; margin-bottom: 16px; }
        header h1 { font-size: 1.3rem; color: #58a6ff; }
        header h1 small { font-size: 0.7rem; color: #8b949e; }
        .clock { font-size: 1rem; color: #f0e6d0; }
        .status-bar { display: flex; gap: 16px; flex-wrap: wrap; padding: 8px 14px; background: rgba(16,24,40,0.6); border: 1px solid #1a2a4a; border-radius: 10px; margin-bottom: 12px; }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .status-dot.active { background: #00ff88; box-shadow: 0 0 15px #00ff88; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn { background: #1f6feb; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
        .btn:hover { background: #58a6ff; }
        .btn-danger { background: #ff6b6b; }
        .btn-danger:hover { background: #ff4757; }
        .btn-success { background: #2ed573; }
        .btn-success:hover { background: #7bed9f; }
        .btn-secondary { background: rgba(26,42,74,0.6); border: 1px solid #1a2a4a; }
        .btn-secondary:hover { border-color: #58a6ff; }
        .live-block { background: rgba(16,24,40,0.8); border: 1px solid #1a2a4a; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; }
        .live-row { display: flex; gap: 10px; padding: 3px 0; font-size: 0.9rem; flex-wrap: wrap; }
        .live-row .label { color: #8b949e; min-width: 100px; font-size: 0.8rem; }
        .live-row .value { color: #f0e6d0; word-break: break-word; flex: 1; }
        .live-row.translation .value { color: #58a6ff; font-weight: 600; }
        .history { background: rgba(16,24,40,0.7); border: 1px solid #1a2a4a; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; }
        .history h3 { color: #8b949e; font-weight: 400; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 8px; }
        .history-item { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid rgba(26,42,74,0.2); font-size: 0.8rem; }
        .history-item .time { color: #5a6a7a; min-width: 60px; }
        .history-item .text { color: #c8d6e5; flex: 1; }
        .history-item .trans { color: #58a6ff; font-weight: 500; }
        #log { background: #161b22; padding: 10px; border-radius: 8px; font-size: 0.75rem; max-height: 120px; overflow-y: auto; color: #5a6a7a; }
        #log .ok { color: #6bcb77; }
        #log .err { color: #ff6b6b; }
        #log .info { color: #ffd93d; }
        .footer { text-align: center; color: #3a4a6a; font-size: 0.65rem; padding: 12px 0; border-top: 1px solid #1a2a4a; margin-top: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🦇 УВБ-76 <small>Живой приёмник</small></h1>
        <div class="clock" id="clock">--:-- MSK</div>
    </header>

    <div class="status-bar">
        <div class="status-item">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Подключение...</span>
        </div>
        <div class="status-item">
            <span>📡</span>
            <span>4625 кГц</span>
        </div>
        <div class="status-item">
            <span>🎤</span>
            <span id="micStatus">Выкл</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-success" id="playBtn">▶ Звук</button>
        <button class="btn btn-danger" id="stopBtn" style="display:none;">⏹ Стоп</button>
        <button class="btn" id="micBtn">🎤 Распознавание</button>
        <button class="btn btn-secondary" id="reconnectBtn">🔄</button>
    </div>

    <div class="live-block">
        <div class="live-row">
            <span class="label">📡 Статус:</span>
            <span class="value" id="statusText2">Ожидание...</span>
        </div>
        <div class="live-row">
            <span class="label">🎤 Что сказано:</span>
            <span class="value" id="liveText">Ожидание...</span>
        </div>
        <div class="live-row translation">
            <span class="label">📖 Перевод:</span>
            <span class="value" id="liveTranslation">—</span>
        </div>
    </div>

    <div class="history">
        <h3>📋 Лента переводов</h3>
        <div id="historyList"><div style="color:#5a6a7a;padding:8px 0;font-size:0.8rem;">Нет перехватов</div></div>
    </div>

    <div id="log">📋 Готов. Нажмите «Звук» и «Распознавание».</div>

    <div class="footer">
        Сервер: redloguna.onrender.com · Распознавание через браузер
    </div>
</div>

<script>
    // ============================================
    //  УВБ-76 — Живой приёмник (ФИНАЛ)
    // ============================================

    let ws = null;
    let audioContext = null;
    let isPlaying = false;
    let recognition = null;
    let isMicActive = false;
    let history = [];

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusText2 = document.getElementById('statusText2');
    const liveText = document.getElementById('liveText');
    const liveTranslation = document.getElementById('liveTranslation');
    const logDiv = document.getElementById('log');
    const historyList = document.getElementById('historyList');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const micBtn = document.getElementById('micBtn');
    const reconnectBtn = document.getElementById('reconnectBtn');
    const micStatus = document.getElementById('micStatus');

    const SERVER_URL = 'wss://redloguna.onrender.com';

    // ----- СЛОВАРЬ -----
    const DICT = {
        "ОБЕЗЬЯНКА": "✅ Завершение операции",
        "МЕРЗЛЫЙ": "🛠️ Техпроверка",
        "ГОЛОСОК": "🔊 Активация сети",
        "ОКОНЧАНЬЕ": "🔇 Завершение сеанса",
        "НЕРЧИНСКИЙ": "🚀 РВСН",
        "СУПЕРМАТИЗМ": "🎯 Наведение",
        "ЛАТВИЯ": "🌍 Прибалтика",
        "КАВКАЗ": "🌍 Кавказ",
        "КИТАЙСКИЙ": "🌍 Китай",
        "0010": "🎯 Боевой приказ",
        "0104": "📡 Смена частоты"
    };

    function translate(text) {
        for (const [key, value] of Object.entries(DICT)) {
            if (text.toUpperCase().includes(key)) {
                return value;
            }
        }
        return '📻 Неизвестно';
    }

    // ----- ИСТОРИЯ -----
    function addHistory(text, translation) {
        const now = new Date();
        const time = now.toTimeString().slice(0, 8);
        history.unshift({ time, text, translation });
        if (history.length > 50) history.pop();
        renderHistory();
    }

    function renderHistory() {
        if (history.length === 0) {
            historyList.innerHTML = '<div style="color:#5a6a7a;padding:8px 0;">Нет перехватов</div>';
            return;
        }
        let html = '';
        history.slice(0, 20).forEach(item => {
            html += `
                <div class="history-item">
                    <span class="time">${item.time}</span>
                    <span class="text">${item.text}</span>
                    <span class="trans">→ ${item.translation}</span>
                </div>
            `;
        });
        historyList.innerHTML = html;
    }

    // ----- ЛОГ -----
    function log(msg, type = 'info') {
        const time = new Date().toTimeString().slice(0, 8);
        const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'info';
        logDiv.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // ----- РАСПОЗНАВАНИЕ -----
    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
            log('❌ Браузер не поддерживает распознавание', 'err');
            return;
        }
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = function(event) {
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const result = event.results[i];
                if (result.isFinal) {
                    const text = result[0].transcript.trim();
                    if (text.length > 2) {
                        const translation = translate(text);
                        liveText.textContent = text;
                        liveTranslation.textContent = translation;
                        addHistory(text, translation);
                        log(`🎤 "${text}" → ${translation}`, 'ok');
                    }
                } else {
                    const text = result[0].transcript.trim();
                    if (text.length > 2) {
                        liveText.textContent = text + '...';
                    }
                }
            }
        };

        recognition.onerror = function(e) {
            if (e.error === 'not-allowed') {
                log('❌ Нет доступа к микрофону', 'err');
            }
            isMicActive = false;
            micBtn.textContent = '🎤 Распознавание';
            micBtn.className = 'btn';
            micStatus.textContent = 'Выкл';
        };

        recognition.onend = function() {
            if (isMicActive) {
                try { recognition.start(); } catch (e) {}
            }
        };
    }

    function toggleMic() {
        if (!recognition) {
            initRecognition();
            if (!recognition) return;
        }
        if (isMicActive) {
            isMicActive = false;
            try { recognition.stop(); } catch (e) {}
            micBtn.textContent = '🎤 Распознавание';
            micBtn.className = 'btn';
            micStatus.textContent = 'Выкл';
            log('⏹ Распознавание остановлено', 'info');
        } else {
            isMicActive = true;
            try { recognition.start(); } catch (e) {}
            micBtn.textContent = '🔴 Слушаю...';
            micBtn.className = 'btn btn-danger';
            micStatus.textContent = 'Вкл';
            log('🎤 Распознавание запущено', 'ok');
        }
    }

    // ----- WEBSOCKET -----
    function connectWebSocket() {
        try {
            ws = new WebSocket(SERVER_URL);
            ws.onopen = function() {
                statusDot.className = 'status-dot active';
                statusText.textContent = '✅ Подключено';
                statusText2.textContent = '✅ Сервер';
                log('✅ Подключено к серверу', 'ok');
            };
            ws.onmessage = function(event) {
                if (event.data instanceof Blob && isPlaying) {
                    playAudio(event.data);
                }
            };
            ws.onerror = function() {
                statusDot.className = 'status-dot';
                statusText.textContent = '❌ Ошибка';
                log('❌ Ошибка сервера', 'err');
            };
            ws.onclose = function() {
                statusDot.className = 'status-dot';
                statusText.textContent = '⚠️ Отключено';
                log('⚠️ Отключено, переподключение...', 'warn');
                setTimeout(connectWebSocket, 5000);
            };
        } catch (e) {
            log('❌ Ошибка подключения: ' + e.message, 'err');
        }
    }

    // ----- АУДИО -----
    function playAudio(data) {
        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                audioContext.decodeAudioData(arrayBuffer, function(buffer) {
                    const source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.destination);
                    source.start(0);
                }, function(e) {
                    // Если не удалось декодировать — игнорируем
                });
            };
            reader.readAsArrayBuffer(data);
        } catch (e) {}
    }

    // ----- КНОПКИ -----
    playBtn.onclick = function() {
        isPlaying = true;
        playBtn.style.display = 'none';
        stopBtn.style.display = 'inline-block';
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        log('🔊 Звук включён', 'ok');
    };

    stopBtn.onclick = function() {
        isPlaying = false;
        playBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        log('🔇 Звук выключен', 'info');
    };

    micBtn.onclick = toggleMic;

    reconnectBtn.onclick = function() {
        if (ws) ws.close();
        setTimeout(connectWebSocket, 500);
        log('🔄 Переподключение...', 'info');
    };

    // ----- ЧАСЫ -----
    setInterval(() => {
        const now = new Date();
        const msk = new Date(now.getTime() + 3 * 60 * 60 * 1000);
        document.getElementById('clock').textContent = msk.toISOString().slice(11, 16) + ' MSK';
    }, 1000);

    // ----- ЗАПУСК -----
    connectWebSocket();
    log('📋 Готов. Нажмите «Звук» и «Распознавание».', 'info');
    log('🌐 Сервер: ' + SERVER_URL, 'info');
</script>

</body>
                </html>
